<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labyrinth 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #ui {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    color: #e8d5a3; text-align: center; pointer-events: none;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }
  #ui h1 { font-size: 1.4rem; letter-spacing: 0.3em; opacity: 0.85; }
  #ui p { font-size: 0.75rem; opacity: 0.6; margin-top: 4px; letter-spacing: 0.1em; }
  #tilt-display {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #e8d5a3; font-size: 0.7rem; opacity: 0.5; letter-spacing: 0.1em;
    pointer-events: none;
  }
  #win-msg {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #ffd700; font-size: 2rem; letter-spacing: 0.3em;
    text-shadow: 0 0 30px rgba(255,215,0,0.8);
    display: none; pointer-events: none;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
</style>
</head>
<body>
<div id="ui">
  <h1>LABYRINTH</h1>
  <p>ARROW KEYS / WASD — TILT THE BOARD</p>
</div>
<div id="tilt-display" id="tilt-display">TILT: X 0° / Z 0°</div>
<div id="win-msg">🏆 IN THE HOLE!</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── SCENE SETUP ────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1008);
scene.fog = new THREE.Fog(0x1a1008, 18, 35);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.physicallyCorrectLights = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ─── CAMERA ─────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
// Camera offset relative to ball (follows ball)
const CAM_OFFSET = new THREE.Vector3(0, 7, 6);

// ─── LIGHTING ────────────────────────────────────────────────────────────────
// Warm ambient
const ambient = new THREE.AmbientLight(0xffeedd, 0.4);
scene.add(ambient);

// Main overhead lamp (warm, casts shadows)
const sunLight = new THREE.DirectionalLight(0xfff5e0, 2.5);
sunLight.position.set(4, 10, 6);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 2048;
sunLight.shadow.mapSize.height = 2048;
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 40;
sunLight.shadow.camera.left = -10;
sunLight.shadow.camera.right = 10;
sunLight.shadow.camera.top = 10;
sunLight.shadow.camera.bottom = -10;
sunLight.shadow.bias = -0.001;
scene.add(sunLight);

// Cool fill light from opposite side
const fillLight = new THREE.DirectionalLight(0xaac8ff, 0.6);
fillLight.position.set(-5, 5, -4);
scene.add(fillLight);

// Rim light
const rimLight = new THREE.PointLight(0xff9955, 1.5, 20);
rimLight.position.set(0, 3, -6);
scene.add(rimLight);

// ─── TEXTURES ────────────────────────────────────────────────────────────────
function makeWoodTexture() {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 512;
  const ctx = c.getContext('2d');

  // Base warm wood color
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(0, 0, 512, 512);

  // Wood grain lines
  for (let i = 0; i < 80; i++) {
    const y = (i / 80) * 512;
    const wave = Math.sin(i * 0.4) * 6;
    ctx.beginPath();
    ctx.moveTo(0, y + wave);
    for (let x = 0; x < 512; x += 4) {
      ctx.lineTo(x, y + Math.sin(x * 0.03 + i * 0.5) * 4 + wave);
    }
    const alpha = 0.08 + Math.random() * 0.12;
    ctx.strokeStyle = `rgba(${i % 2 === 0 ? '60,30,10' : '180,120,60'},${alpha})`;
    ctx.lineWidth = 1.5 + Math.random() * 2;
    ctx.stroke();
  }

  // Knot
  const grad = ctx.createRadialGradient(160, 200, 2, 160, 200, 28);
  grad.addColorStop(0, 'rgba(50,25,10,0.7)');
  grad.addColorStop(0.5, 'rgba(90,50,20,0.4)');
  grad.addColorStop(1, 'rgba(139,94,60,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.ellipse(160, 200, 28, 18, 0.3, 0, Math.PI * 2);
  ctx.fill();

  return new THREE.CanvasTexture(c);
}

function makeMetalTexture() {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 256;
  const ctx = c.getContext('2d');

  const grad = ctx.createRadialGradient(100, 80, 5, 128, 128, 128);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.3, '#d8e8f0');
  grad.addColorStop(0.7, '#7a9ab0');
  grad.addColorStop(1, '#3a5060');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 256, 256);

  // Brushed streaks
  for (let i = 0; i < 40; i++) {
    const y = Math.random() * 256;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(256, y + (Math.random() - 0.5) * 8);
    ctx.strokeStyle = `rgba(255,255,255,${Math.random() * 0.06})`;
    ctx.lineWidth = Math.random() * 2;
    ctx.stroke();
  }
  return new THREE.CanvasTexture(c);
}

function makeWoodNormalTexture() {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 512;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#8080ff'; // flat normal (pointing up)
  ctx.fillRect(0, 0, 512, 512);
  for (let i = 0; i < 80; i++) {
    const y = (i / 80) * 512;
    ctx.beginPath();
    for (let x = 0; x < 512; x++) {
      ctx.lineTo(x, y + Math.sin(x * 0.03 + i * 0.5) * 3);
    }
    ctx.strokeStyle = `rgba(100,100,255,0.3)`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  return new THREE.CanvasTexture(c);
}

const woodTex = makeWoodTexture();
woodTex.wrapS = woodTex.wrapT = THREE.RepeatWrapping;
woodTex.repeat.set(2, 2);

const metalTex = makeMetalTexture();
const woodNormal = makeWoodNormalTexture();
woodNormal.wrapS = woodNormal.wrapT = THREE.RepeatWrapping;
woodNormal.repeat.set(2, 2);

// ─── BOARD ───────────────────────────────────────────────────────────────────
const BOARD_W = 10;
const BOARD_H = 0.4;
const BOARD_D = 10;

const boardGroup = new THREE.Group();
scene.add(boardGroup);

// Floor
const floorGeo = new THREE.BoxGeometry(BOARD_W, BOARD_H, BOARD_D);
const floorMat = new THREE.MeshStandardMaterial({
  map: woodTex,
  normalMap: woodNormal,
  normalScale: new THREE.Vector2(0.8, 0.8),
  roughness: 0.75,
  metalness: 0.05,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.receiveShadow = true;
floor.position.y = -BOARD_H / 2;
boardGroup.add(floor);

// Walls (4 sides)
const wallMat = new THREE.MeshStandardMaterial({
  map: woodTex,
  normalMap: woodNormal,
  normalScale: new THREE.Vector2(0.5, 0.5),
  roughness: 0.8,
  metalness: 0.02,
  color: 0xc49a5a,
});

function makeWall(w, h, d, x, y, z) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mesh = new THREE.Mesh(geo, wallMat);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  boardGroup.add(mesh);
  return mesh;
}

const WALL_H = 0.5;
const WALL_T = 0.3;
const HW = BOARD_W / 2;
const HD = BOARD_D / 2;

makeWall(BOARD_W, WALL_H, WALL_T, 0, WALL_H/2, -HD);   // back
makeWall(BOARD_W, WALL_H, WALL_T, 0, WALL_H/2,  HD);   // front
makeWall(WALL_T, WALL_H, BOARD_D, -HW, WALL_H/2, 0);   // left
makeWall(WALL_T, WALL_H, BOARD_D,  HW, WALL_H/2, 0);   // right

// ─── HOLE ────────────────────────────────────────────────────────────────────
const HOLE_R = 0.42;
const holePos = new THREE.Vector3(2.5, 0, 2.5); // goal position on board

// Dark circle to represent hole
const holeGeo = new THREE.CircleGeometry(HOLE_R, 32);
const holeMat = new THREE.MeshStandardMaterial({ color: 0x050302, roughness: 1, metalness: 0 });
const holeMesh = new THREE.Mesh(holeGeo, holeMat);
holeMesh.rotation.x = -Math.PI / 2;
holeMesh.position.set(holePos.x, 0.01, holePos.z);
boardGroup.add(holeMesh);

// Hole ring
const ringGeo = new THREE.TorusGeometry(HOLE_R, 0.04, 8, 32);
const ringMat = new THREE.MeshStandardMaterial({ color: 0x1a1008, roughness: 0.9, metalness: 0.1 });
const ringMesh = new THREE.Mesh(ringGeo, ringMat);
ringMesh.rotation.x = -Math.PI / 2;
ringMesh.position.set(holePos.x, 0.02, holePos.z);
boardGroup.add(ringMesh);

// ─── BALL ────────────────────────────────────────────────────────────────────
const BALL_R = 0.28;
const ballGeo = new THREE.SphereGeometry(BALL_R, 32, 32);
const ballMat = new THREE.MeshStandardMaterial({
  map: metalTex,
  roughness: 0.08,
  metalness: 0.95,
  envMapIntensity: 1.5,
  color: 0xc8dde8,
});
const ball = new THREE.Mesh(ballGeo, ballMat);
ball.castShadow = true;
ball.position.set(-3, BALL_R, -3);
boardGroup.add(ball);

// Ball shadow (fake soft shadow disc)
const shadowGeo = new THREE.CircleGeometry(BALL_R * 0.9, 24);
const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.35 });
const ballShadow = new THREE.Mesh(shadowGeo, shadowMat);
ballShadow.rotation.x = -Math.PI / 2;
ballShadow.position.y = 0.005;
boardGroup.add(ballShadow);

// ─── PHYSICS STATE ───────────────────────────────────────────────────────────
const ballPos = new THREE.Vector3(-3, BALL_R, -3);
const ballVel = new THREE.Vector3(0, 0, 0);
let tiltX = 0; // board tilt around X axis (controls Z movement)
let tiltZ = 0; // board tilt around Z axis (controls X movement)
const MAX_TILT = 0.22; // radians
const TILT_SPEED = 0.008;
const GRAVITY = 9.8;
const FRICTION = 0.985;
let won = false;

// ─── INPUT ───────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

// ─── RESIZE ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── GAME LOOP ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
const tiltDisplay = document.getElementById('tilt-display');
const winMsg = document.getElementById('win-msg');

function update(dt) {
  if (won) return;

  // Input → tilt
  if (keys['ArrowUp']    || keys['KeyW']) tiltX = Math.max(tiltX - TILT_SPEED, -MAX_TILT);
  if (keys['ArrowDown']  || keys['KeyS']) tiltX = Math.min(tiltX + TILT_SPEED,  MAX_TILT);
  if (keys['ArrowLeft']  || keys['KeyA']) tiltZ = Math.min(tiltZ + TILT_SPEED,  MAX_TILT);
  if (keys['ArrowRight'] || keys['KeyD']) tiltZ = Math.max(tiltZ - TILT_SPEED, -MAX_TILT);

  // Tilt spring-back when no input
  if (!keys['ArrowUp'] && !keys['KeyW'] && !keys['ArrowDown'] && !keys['KeyS'])
    tiltX *= 0.92;
  if (!keys['ArrowLeft'] && !keys['KeyA'] && !keys['ArrowRight'] && !keys['KeyD'])
    tiltZ *= 0.92;

  // Gravity projected onto tilted plane → acceleration
  const accelX = Math.sin(tiltZ) * GRAVITY;
  const accelZ = Math.sin(tiltX) * GRAVITY;

  ballVel.x += accelX * dt;
  ballVel.z += accelZ * dt;
  ballVel.x *= FRICTION;
  ballVel.z *= FRICTION;

  ballPos.x += ballVel.x * dt;
  ballPos.z += ballVel.z * dt;

  // Board boundary collision (simple AABB)
  const bx = HW - WALL_T / 2 - BALL_R;
  const bz = HD - WALL_T / 2 - BALL_R;
  if (ballPos.x > bx)  { ballPos.x = bx;  ballVel.x *= -0.4; }
  if (ballPos.x < -bx) { ballPos.x = -bx; ballVel.x *= -0.4; }
  if (ballPos.z > bz)  { ballPos.z = bz;  ballVel.z *= -0.4; }
  if (ballPos.z < -bz) { ballPos.z = -bz; ballVel.z *= -0.4; }

  // Check hole
  const dx = ballPos.x - holePos.x;
  const dz = ballPos.z - holePos.z;
  if (Math.sqrt(dx*dx + dz*dz) < HOLE_R * 0.8) {
    won = true;
    winMsg.style.display = 'block';
    // Animate ball dropping
    gsapBallDrop();
  }

  // Roll the ball visually
  const speed = ballVel.length();
  if (speed > 0.001) {
    ball.rotateOnWorldAxis(
      new THREE.Vector3(-ballVel.z, 0, ballVel.x).normalize(),
      (speed * dt) / BALL_R
    );
  }

  // Update positions
  ball.position.copy(ballPos);
  ballShadow.position.x = ballPos.x;
  ballShadow.position.z = ballPos.z;

  // Board tilt
  boardGroup.rotation.x = tiltX;
  boardGroup.rotation.z = tiltZ;

  // HUD
  tiltDisplay.textContent =
    `TILT  X ${(tiltX * 180 / Math.PI).toFixed(1)}°  /  Z ${(tiltZ * 180 / Math.PI).toFixed(1)}°`;
}

let dropT = 0;
function gsapBallDrop() {
  // Simple drop animation without GSAP
  const startY = ballPos.y;
  const animate = () => {
    dropT += 0.04;
    ball.position.y = startY - dropT * dropT * 2;
    ball.scale.setScalar(Math.max(0.01, 1 - dropT * 0.8));
    if (ball.position.y > -2) requestAnimationFrame(animate);
  };
  animate();
}

// ─── CAMERA FOLLOW ───────────────────────────────────────────────────────────
const camTarget = new THREE.Vector3();
const camPos    = new THREE.Vector3();

function updateCamera() {
  // World position of ball (board is rotated so we need world coords)
  const ballWorld = new THREE.Vector3();
  ball.getWorldPosition(ballWorld);

  // Smooth camera follow
  camTarget.lerp(ballWorld, 0.08);
  const desiredCamPos = camTarget.clone().add(CAM_OFFSET);
  camera.position.lerp(desiredCamPos, 0.08);
  camera.lookAt(camTarget);
}

// ─── RENDER LOOP ─────────────────────────────────────────────────────────────
function render() {
  requestAnimationFrame(render);
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  updateCamera();
  renderer.render(scene, camera);
}

render();
</script>
</body>
</html>
